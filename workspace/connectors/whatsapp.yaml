# Capability declared by hand; `state:` is auto-generated by the backend
# (pair / connect / scope / sync events) — do not edit state manually.
name: whatsapp
type: http-sidecar
endpoint: ${SIDECAR_URL}
actions:
  history: GET /history
  qr: GET /qr
auth:
  kind: qr-pairing
  secret_env: INGEST_SECRET
provides:
- capability: fetch_history
  params:
    since_days: int
  returns: IngestMessage[]
state:
  status: connected
  updated_at: '2026-07-12T09:34:18+00:00'
  chats:
    scoped:
    - jid: 120363429434349589@g.us
      name: LOGISTICS TEST
      is_group: true
      message_count: 4
      last_message_at: '2026-07-12T09:34:17+00:00'
    scoped_count: 1
    total_seen: 207
    note: only scoped chats are fetchable; toggle scope on the connections page
  workflow_fetch:
    step:
      type: fetch
      source: whatsapp
      since_days: <int> OR use from_date/to_date (ISO dates)
      chat_jids: optional list — must be a subset of state.chats.scoped[].jid
